name: iPhone Web Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: github-pages-preview
  cancel-in-progress: true

jobs:
  deploy-web-preview:
    name: Build and deploy web preview
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Non-blocking format check
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Non-blocking analyzer check
        continue-on-error: true
        run: flutter analyze

      - name: Build Flutter web preview
        run: flutter build web --release --base-href /nz-vege-garden/

      - name: Add revision title
        run: |
          SHORT_REV="${GITHUB_SHA::7}"
          BUILD_TITLE="NZ Veg Garden · rev ${SHORT_REV}"
          export SHORT_REV BUILD_TITLE

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          index_path = Path('build/web/index.html')
          html = index_path.read_text(encoding='utf-8')
          title = os.environ['BUILD_TITLE']
          short_rev = os.environ['SHORT_REV']

          if '<title>' in html and '</title>' in html:
              html = re.sub(r'<title>.*?</title>', f'<title>{title}</title>', html, count=1, flags=re.S)
          else:
              html = html.replace('</head>', f'  <title>{title}</title>\n</head>')

          meta = f'<meta name="build-revision" content="{short_rev}">'
          if 'name="build-revision"' in html:
              html = re.sub(r'<meta name="build-revision" content=".*?">', meta, html, count=1)
          else:
              html = html.replace('</head>', f'  {meta}\n</head>')

          index_path.write_text(html, encoding='utf-8')
          PY

          echo "${BUILD_TITLE}" > build/web/BUILD_TITLE.txt
          echo "${SHORT_REV}" > build/web/REVISION.txt

      - name: Add preview notes
        run: |
          cat > build/web/PREVIEW_README.txt <<'EOF'
          NZ Veg Garden - iPhone Web Preview

          Open the published GitHub Pages URL on iPhone Safari:
          https://archil3s.github.io/nz-vege-garden/

          This preview is built from the latest main branch commit.
          BUILD_TITLE.txt and REVISION.txt identify the deployed revision.
          EOF

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: nz-veg-garden-web-preview
          path: build/web
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy GitHub Pages preview
        id: deployment
        uses: actions/deploy-pages@v4
