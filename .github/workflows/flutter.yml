name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  flutter:
    name: Analyze, test, and build preview artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web preview
        run: flutter build web --release --base-href /nz-vege-garden/

      - name: Add revision title to web preview
        run: |
          REV="${GITHUB_SHA::7}"
          TITLE="NZ Vege Garden · rev ${REV}"
          python3 - <<'PY'
          import os
          from pathlib import Path

          index_path = Path('build/web/index.html')
          html = index_path.read_text(encoding='utf-8')
          title = os.environ.get('TITLE', 'NZ Vege Garden')

          if '<title>' in html and '</title>' in html:
              import re
              html = re.sub(r'<title>.*?</title>', f'<title>{title}</title>', html, count=1, flags=re.S)
          else:
              html = html.replace('</head>', f'  <title>{title}</title>\n</head>')

          revision_meta = f'<meta name="build-revision" content="{os.environ.get("REV", "unknown")}">'
          if 'name="build-revision"' not in html:
              html = html.replace('</head>', f'  {revision_meta}\n</head>')

          index_path.write_text(html, encoding='utf-8')
          PY
          echo "${TITLE}" > build/web/BUILD_TITLE.txt
          echo "${REV}" > build/web/REVISION.txt
        env:
          REV: ${{ github.sha }}
          TITLE: NZ Vege Garden · rev ${{ github.sha }}

      - name: Add offline viewing notes
        run: |
          cat > build/web/OFFLINE_VIEW_README.txt <<'EOF'
          NZ Vege Garden - Offline Web View

          This artifact contains the static Flutter Web release build.

          To view locally:
          1. Download and unzip the artifact.
          2. Serve the folder with a tiny local web server.

          Example:
            cd build/web
            python3 -m http.server 8080

          Then open:
            http://localhost:8080

          Notes:
          - Opening index.html directly from the file system may not work in all browsers.
          - This is a static offline preview artifact. Network-backed features still require their services.
          - BUILD_TITLE.txt and REVISION.txt identify the deployed build.
          EOF

      - name: Upload offline web artifact
        uses: actions/upload-artifact@v4
        with:
          name: nz-vege-garden-offline-web
          path: build/web
          if-no-files-found: error
          retention-days: 14

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Add Android install notes
        run: |
          mkdir -p phone-preview
          cp build/app/outputs/flutter-apk/app-debug.apk phone-preview/nz-vege-garden-debug.apk
          cat > phone-preview/ANDROID_INSTALL_README.txt <<'EOF'
          NZ Vege Garden - Android Phone Preview

          This artifact contains a debug APK for direct phone testing.

          To install on Android:
          1. Download the nz-vege-garden-android-debug-apk artifact from GitHub Actions.
          2. Unzip it on your phone or computer.
          3. Open nz-vege-garden-debug.apk on your Android phone.
          4. Allow install from unknown apps when prompted.

          Notes:
          - This is a debug build for testing, not a Play Store release.
          - iPhone cannot install this APK. iPhone testing needs TestFlight or a local Xcode/iOS build.
          EOF

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nz-vege-garden-android-debug-apk
          path: phone-preview
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy GitHub Pages preview
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
