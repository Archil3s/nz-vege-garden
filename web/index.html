<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NZ Vege Garden - offline-first vegetable gardening planner for New Zealand home growers.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NZ Veg Garden">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F8F3E8">

  <title>NZ Veg Garden</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --garden-ink: #172d22;
      --garden-leaf: #17452f;
      --garden-surface: #fffdf7;
      --garden-border: #e7dfce;
      --garden-muted: #66736a;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: #f8f3e8;
      overflow: hidden;
    }

    .preview-overlay-root {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .preview-button,
    .preview-chip,
    .preview-sheet,
    .swipe-hint {
      pointer-events: auto;
    }

    .preview-button-row {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 18px);
      right: 18px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .preview-button {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 999px;
      background: var(--garden-leaf);
      color: white;
      box-shadow: 0 14px 28px rgba(23, 45, 34, .22);
      font: 900 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: -.01em;
    }

    .preview-button.secondary {
      background: rgba(255, 253, 247, .98);
      color: var(--garden-leaf);
      border-color: var(--garden-border);
    }

    .preview-chip {
      position: fixed;
      left: 18px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 86px);
      max-width: calc(100vw - 36px);
      padding: 9px 12px;
      border: 1px solid var(--garden-border);
      border-radius: 999px;
      background: rgba(255, 253, 247, .96);
      color: var(--garden-leaf);
      box-shadow: 0 10px 24px rgba(23, 45, 34, .16);
      font: 900 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      white-space: nowrap;
    }

    .swipe-hint {
      position: fixed;
      right: 12px;
      top: 47vh;
      transform: translateY(-50%);
      max-width: 116px;
      padding: 10px 11px;
      border: 1px solid rgba(255, 255, 255, .34);
      border-radius: 999px;
      background: rgba(23, 69, 47, .92);
      color: white;
      box-shadow: 0 14px 30px rgba(23, 45, 34, .24);
      font: 900 12px/1.15 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      transition: opacity .2s ease;
    }

    .swipe-hint.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .preview-sheet {
      position: fixed;
      left: 16px;
      right: 16px;
      top: calc(env(safe-area-inset-top, 0px) + 72px);
      display: none;
      max-width: 460px;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--garden-border);
      border-radius: 28px;
      background: rgba(255, 253, 247, .985);
      box-shadow: 0 22px 48px rgba(23, 45, 34, .22);
      color: var(--garden-ink);
    }

    .preview-sheet[aria-hidden="false"] {
      display: block;
    }

    .preview-sheet h2 {
      margin: 0 0 6px;
      font-size: 20px;
      letter-spacing: -.03em;
    }

    .preview-sheet p {
      margin: 0 0 12px;
      color: var(--garden-muted);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.35;
    }

    .preview-sheet ol,
    .preview-sheet ul {
      margin: 0;
      padding-left: 20px;
    }

    .preview-sheet li {
      margin: 8px 0;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.35;
    }

    .preview-close {
      width: 100%;
      margin-top: 14px;
      min-height: 42px;
      border: 0;
      border-radius: 18px;
      background: #e7f0db;
      color: var(--garden-leaf);
      font: 900 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <script>
    window.addEventListener('load', () => {
      const root = document.createElement('div');
      root.className = 'preview-overlay-root';
      root.innerHTML = `
        <div class="preview-button-row">
          <button class="preview-button secondary" type="button" data-sheet="install">Install</button>
          <button class="preview-button" type="button" data-sheet="release">TL;DR</button>
        </div>
        <button class="swipe-hint" type="button" aria-label="Swipe left for next card">Swipe left<br>for next</button>
        <div class="preview-chip">iPhone preview · swipe left for next card</div>
        <section id="release-sheet" class="preview-sheet" aria-hidden="true" role="dialog" aria-label="Offline update summary">
          <h2>Offline update TL;DR</h2>
          <p>Latest pushed version for the iPhone web/offline preview.</p>
          <ul>
            <li>Home uses horizontal cards, not vertical scroll.</li>
            <li>Swipe left on the main garden card to reach Sow, Pruning, Tools, and Best Pick.</li>
            <li>Weekly tasks now open quick detail sheets with practical steps.</li>
            <li>Current visible check: iPhone preview · swipe left for next card.</li>
          </ul>
          <button class="preview-close" type="button">Close</button>
        </section>
        <section id="install-sheet" class="preview-sheet" aria-hidden="true" role="dialog" aria-label="Install on iPhone guide">
          <h2>Add to iPhone Home Screen</h2>
          <p>Use this to test the app more like an offline iPhone app.</p>
          <ol>
            <li>Open this page in Safari.</li>
            <li>Tap the iOS share button.</li>
            <li>Choose Add to Home Screen.</li>
            <li>Open NZ Veg Garden from the new Home Screen icon.</li>
          </ol>
          <button class="preview-close" type="button">Close</button>
        </section>
      `;
      document.body.appendChild(root);

      const sheets = {
        release: root.querySelector('#release-sheet'),
        install: root.querySelector('#install-sheet'),
      };
      const swipeHint = root.querySelector('.swipe-hint');

      function setSheet(name) {
        Object.entries(sheets).forEach(([key, sheet]) => {
          sheet.setAttribute('aria-hidden', String(key !== name));
        });
      }

      function closeSheets() {
        Object.values(sheets).forEach((sheet) => sheet.setAttribute('aria-hidden', 'true'));
      }

      root.querySelectorAll('[data-sheet]').forEach((button) => {
        button.addEventListener('click', () => {
          const name = button.getAttribute('data-sheet');
          const currentOpen = sheets[name].getAttribute('aria-hidden') === 'false';
          currentOpen ? closeSheets() : setSheet(name);
        });
      });

      root.querySelectorAll('.preview-close').forEach((button) => {
        button.addEventListener('click', closeSheets);
      });

      swipeHint.addEventListener('click', () => {
        setSheet('release');
      });

      setTimeout(() => swipeHint.classList.add('is-hidden'), 9000);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
