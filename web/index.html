<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NZ Vege Garden - offline-first vegetable gardening planner for New Zealand home growers.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NZ Veg Garden">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F8F3E8">

  <title>NZ Veg Garden</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --garden-ink: #172d22;
      --garden-leaf: #17452f;
      --garden-surface: #fffdf7;
      --garden-border: #e7dfce;
      --garden-muted: #66736a;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: #f8f3e8;
      overflow: hidden;
    }

    .release-overlay-root {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .release-button,
    .release-chip,
    .release-sheet {
      pointer-events: auto;
    }

    .release-button {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 18px);
      right: 18px;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 999px;
      background: var(--garden-leaf);
      color: white;
      box-shadow: 0 14px 28px rgba(23, 45, 34, .22);
      font: 900 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: -.01em;
    }

    .release-chip {
      position: fixed;
      left: 18px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 86px);
      max-width: calc(100vw - 36px);
      padding: 9px 12px;
      border: 1px solid var(--garden-border);
      border-radius: 999px;
      background: rgba(255, 253, 247, .96);
      color: var(--garden-leaf);
      box-shadow: 0 10px 24px rgba(23, 45, 34, .16);
      font: 900 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      white-space: nowrap;
    }

    .release-sheet {
      position: fixed;
      left: 16px;
      right: 16px;
      top: calc(env(safe-area-inset-top, 0px) + 72px);
      display: none;
      max-width: 460px;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--garden-border);
      border-radius: 28px;
      background: rgba(255, 253, 247, .985);
      box-shadow: 0 22px 48px rgba(23, 45, 34, .22);
      color: var(--garden-ink);
    }

    .release-sheet[aria-hidden="false"] {
      display: block;
    }

    .release-sheet h2 {
      margin: 0 0 6px;
      font-size: 20px;
      letter-spacing: -.03em;
    }

    .release-sheet p {
      margin: 0 0 12px;
      color: var(--garden-muted);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.35;
    }

    .release-sheet ul {
      margin: 0;
      padding-left: 20px;
    }

    .release-sheet li {
      margin: 8px 0;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.35;
    }

    .release-close {
      width: 100%;
      margin-top: 14px;
      min-height: 42px;
      border: 0;
      border-radius: 18px;
      background: #e7f0db;
      color: var(--garden-leaf);
      font: 900 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <script>
    window.addEventListener('load', () => {
      const root = document.createElement('div');
      root.className = 'release-overlay-root';
      root.innerHTML = `
        <button class="release-button" type="button" aria-controls="release-sheet" aria-expanded="false">TL;DR</button>
        <div class="release-chip">Offline preview · rev 706d0e</div>
        <section id="release-sheet" class="release-sheet" aria-hidden="true" role="dialog" aria-label="Offline update summary">
          <h2>Offline update TL;DR</h2>
          <p>Latest pushed version for the iPhone web/offline preview.</p>
          <ul>
            <li>Home screen card spacing tightened for iPhone.</li>
            <li>Today’s actions no longer overlap inside the card.</li>
            <li>Bottom navigation is framed and easier to tap.</li>
            <li>iPhone web app metadata and safe-area support were added.</li>
            <li>Current visible check: Offline preview · rev 706d0e.</li>
          </ul>
          <button class="release-close" type="button">Close</button>
        </section>
      `;
      document.body.appendChild(root);

      const releaseButton = root.querySelector('.release-button');
      const releaseSheet = root.querySelector('#release-sheet');
      const releaseClose = root.querySelector('.release-close');

      function setReleaseSheet(open) {
        releaseSheet.setAttribute('aria-hidden', String(!open));
        releaseButton.setAttribute('aria-expanded', String(open));
      }

      releaseButton.addEventListener('click', () => {
        const open = releaseSheet.getAttribute('aria-hidden') === 'true';
        setReleaseSheet(open);
      });

      releaseClose.addEventListener('click', () => setReleaseSheet(false));
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
