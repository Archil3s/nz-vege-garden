name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-android-apk.yml'
      - 'assets/**'
      - 'lib/**'
      - 'test/**'
      - 'tools/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name nz_vege_garden .

      - name: Get packages
        run: flutter pub get

      - name: Validate bundled data
        run: python tools/validate_data.py

      - name: Run static sanity checks
        run: python tools/static_sanity_check.py

      - name: Analyze Flutter code
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nz-vege-garden-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
