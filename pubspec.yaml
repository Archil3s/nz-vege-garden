name: nz_vege_garden
description: Offline-first New Zealand vegetable garden planner for home growers.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.1
  path_provider: ^2.1.3

  # Local-first database packages will be enabled once the data layer moves from JSON to SQLite.
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.23
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/crops.json
    - assets/data/nz_regions.json
    - assets/data/planting_rules.json
    - assets/data/pests.json
